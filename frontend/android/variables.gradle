ext {
    minSdkVersion = 22
    compileSdkVersion = 35
    targetSdkVersion = 35
    androidxActivityVersion = '1.8.0'
    androidxAppCompatVersion = '1.6.1'
    androidxCoordinatorLayoutVersion = '1.2.0'
    androidxCoreVersion = '1.12.0'
    androidxFragmentVersion = '1.6.2'
    coreSplashScreenVersion = '1.0.1'
    androidxWebkitVersion = '1.9.0'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.1.5'
    androidxEspressoCoreVersion = '3.5.1'
    cordovaAndroidVersion = '10.1.1'

    // @capacitor-firebase/authentication — Google Sign-In 활성화 (play-services-auth 를
    // compileOnly → implementation 으로 승격. 이게 없으면 런타임에 NoClassDefFoundError).
    rgcfaIncludeGoogle = true
    // 필요 시 버전 오버라이드 (기본: firebaseAuthVersion=22.3.1, playServicesAuthVersion=21.0.0)
    // firebaseAuthVersion = '22.3.1'
    // playServicesAuthVersion = '21.0.0'
}