<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <title>Moa365 — AI 가계부</title>

  <!-- 왼쪽 마크: 둥근 사각형 + Moa/365 두 줄 -->
  <g>
    <rect x="6" y="10" width="60" height="60" rx="14" ry="14" fill="#E07856"/>
    <text x="36" y="38"
          font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
          font-size="17" font-weight="800" fill="#FFFDF8"
          text-anchor="middle" letter-spacing="-0.5">Moa</text>
    <text x="36" y="58"
          font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
          font-size="17" font-weight="900" fill="#FFFDF8"
          text-anchor="middle" letter-spacing="-0.5">365</text>
  </g>

  <!-- 워드마크: Moa365 -->
  <g>
    <!-- Moa: terra accent -->
    <text x="86" y="48"
          font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
          font-size="30" font-weight="800" fill="#E07856"
          letter-spacing="-1">Moa</text>

    <!-- 365: ink black -->
    <text x="160" y="48"
          font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
          font-size="30" font-weight="900" fill="#2E2A24"
          letter-spacing="-1">365</text>

    <!-- 서브 태그: AI 가계부 -->
    <text x="86" y="68"
          font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
          font-size="11" font-weight="600" fill="#7A7567"
          letter-spacing="2">AI 가계부 · daily</text>
  </g>
</svg>
