<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>Moa365 — AI 가계부</title>

  <!-- 배경 cream -->
  <rect width="512" height="512" rx="96" ry="96" fill="#FBF8F3"/>

  <!-- 메인 카드 -->
  <rect x="64" y="64" width="384" height="384" rx="64" ry="64" fill="#E07856"/>

  <!-- 부드러운 highlight -->
  <path d="M 80 96 Q 256 60 432 96 L 432 200 Q 256 168 80 200 Z"
        fill="#FFFFFF" opacity="0.12"/>

  <!-- Moa: 큰 글자 -->
  <text x="256" y="248"
        font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
        font-size="132" font-weight="800" fill="#FFFDF8"
        text-anchor="middle" letter-spacing="-4">Moa</text>

  <!-- 구분선 -->
  <line x1="180" y1="288" x2="332" y2="288"
        stroke="#FFFDF8" stroke-width="3" opacity="0.5"/>

  <!-- 365: 같은 크기, 살짝 더 굵게 (강조) -->
  <text x="256" y="366"
        font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
        font-size="132" font-weight="900" fill="#FFFDF8"
        text-anchor="middle" letter-spacing="-4">365</text>

  <!-- 서브 태그: AI 가계부 -->
  <text x="256" y="418"
        font-family="-apple-system, 'Segoe UI', system-ui, sans-serif"
        font-size="22" font-weight="600" fill="#FFFDF8" opacity="0.75"
        text-anchor="middle" letter-spacing="6">AI 가계부</text>
</svg>
